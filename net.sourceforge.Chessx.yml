id: net.sourceforge.Chessx
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
rename-icon: chessx
command: chessx
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --socket=pulseaudio
  - --share=network
  - --device=dri
modules:
  - name: stockfish # Stockfish engine, put into /app/engines
    subdir: src
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            ARCH: x86-64
        aarch64:
          env:
            ARCH: armv8
    build-commands:
      - make -j $FLATPAK_BUILDER_N_JOBS build
      - make install BINDIR=/app/engines
    sources:
      - type: archive
        url: https://github.com/official-stockfish/Stockfish/archive/sf_18.tar.gz
        sha256: 22a195567e3493e7c9ca8bf8fa2339f4ffc876384849ac8a417ff4b919607e7b
        x-checker-data:
          type: anitya
          project-id: 5750
          url-template: https://github.com/official-stockfish/Stockfish/archive/sf_$version.tar.gz
      - type: file
        dest: src
        url: https://tests.stockfishchess.org/api/nn/nn-c288c895ea92.nnue
        sha256: c288c895ea924429ea9092e3f36b2b3c1f00f2a3a4c759ff7e57e79e3b43e4a7
      - type: file
        dest: src
        url: https://tests.stockfishchess.org/api/nn/nn-37f18f62d772.nnue
        sha256: 37f18f62d772f3107e1d6aaca3898c130c3c86f2ab63e6555fbbca20635a899d
  - name: chessx
    buildsystem: qmake
    no-make-install: true
    config-opts:
      - PREFIX=/app
      - PREFIX_LIB=/lib
      - CONFIG+=release
    post-install:
      - install -Dm755 release/chessx /app/bin/chessx
      - install -Dm644 unix/chessx.desktop /app/share/applications/net.sourceforge.Chessx.desktop
      - install -Dm644 data/images/chessx.png /app/share/icons/hicolor/128x128/apps/chessx.png
      - install -Dm644 data/images/chessx-32.png /app/share/icons/hicolor/32x32/apps/chessx.png
      - install -Dm644 data/images/chessx-64.png /app/share/icons/hicolor/64x64/apps/chessx.png
      - install -Dm755 net.sourceforge.Chessx.metainfo.xml /app/share/metainfo/net.sourceforge.Chessx.metainfo.xml
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/chessx/chessx/1.6.10/chessx-1.6.10.tgz
        sha256: 77c6ef3f89d8c3ea137a5f4bb0dcd83b261046facbde06eaee223437ad1c732f
        x-checker-data:
          type: json
          url: https://sourceforge.net/projects/chessx/best_release.json
          version-query: .platform_releases.linux.filename | split("/") | .[2]
          # Use Linux-specific URL | Replace http with https | Trim timestamp
          url-query: .platform_releases.linux.url | sub("^http://"; "https://") |
            sub("\\?ts=.*$"; "")
      - type: file
        path: net.sourceforge.Chessx.metainfo.xml
